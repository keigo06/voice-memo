# マイクデバイス
# null = システムデフォルトを使用
# 文字列 = 部分一致でデバイスを検索（IDではなく名前で指定することで抜き差しに強くする）
device_name: null
# device_name: "USB Audio"

# 録音設定
sample_rate: 16000          # Whisper推奨値
channels: 1                 # モノラル（音声認識に十分）
memo_max_duration: 300      # メモモード最大録音秒数（安全装置）

# Web UIサーバー
server_port: 8765
open_browser: true          # false にするとブラウザを自動で開かない

# Whisper設定
whisper_model: "small"      # tiny / base / small / medium / large
whisper_language: "ja"      # 明示することで精度向上・高速化
whisper_device: "cpu"       # cpu / cuda
whisper_prompt: ""          # 専門用語を渡すプロンプト
                            # 例: "ロボット実験の音声メモ。ROS、IMU、ヨー角などの用語が含まれる。"

# --- 文字起こし精度設定 ---
# whisper_beam_size: 5        # 大きいほど高精度・低速（推奨: 通常=5, 高精度=10）
# whisper_vad_filter: false   # true にすると無音区間を除去して精度向上
# whisper_compute_type: "int8" # CPU: "int8"(速い) / "float32"(精度高い)  GPU: "float16"

# ホットキー（録音開始/停止トグル）
# pynput 形式: <ctrl>+<alt>+r など
# hotkey: "<ctrl>+<alt>+r"

# --- 話者分離設定（pyannote.audio が必要: uv sync --extra diarize）---
# 話者分離を使うには HuggingFace トークンが必要:
# 1. https://huggingface.co/pyannote/speaker-diarization-3.1 で利用規約に同意
# 2. https://huggingface.co/settings/tokens でトークンを作成（read 権限）
# hf_token: "hf_xxxxxxxxxxxx"

# --- LLM 要約設定（anthropic が必要: uv sync --extra summarize）---
# llm_provider: "anthropic"   # "anthropic" | "openai"
# llm_model: ""               # 空文字=デフォルト (anthropic: claude-haiku-4-5-20251001, openai: gpt-4o-mini)
# llm_api_key: ""             # 空文字=環境変数から取得 (ANTHROPIC_API_KEY / OPENAI_API_KEY)
